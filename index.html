<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>etro 120 4/4</title>
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" type="image/svg+xml" href="./assets/icons/favicon.svg" />
    <link rel="apple-touch-icon" href="./assets/icons/apple-touch-icon.png" />
    <link href="https://fonts.cdnfonts.com/css/alliance-no1" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./assets/css/styles.css" />
  </head>
  <body class="bg-neutral-950 text-neutral-100 selection:bg-lime-400 selection:text-black">
    <div class="app-shell min-h-screen px-4 py-4 sm:px-6 sm:py-6">
      <main id="appLayout" class="mx-auto grid max-w-7xl gap-4 lg:grid-cols-[1.85fr_0.7fr] lg:gap-5">
        <section
          id="livePanel"
          class="relative min-h-[60vh] overflow-hidden rounded-3xl border border-neutral-800 bg-gradient-to-b from-neutral-900 to-black p-4 sm:p-6 lg:min-h-[82vh]"
        >
          <div class="relative z-10 flex h-full flex-col justify-between gap-6 sm:gap-8">
            <header>
              <div class="flex items-start justify-between gap-3">
                <div class="min-w-0">
                  <div class="relative">
                    <button
                      id="currentSongTitle"
                      type="button"
                      class="line-ui inline-block max-w-full rounded-xl px-1.5 py-1.5 text-left text-4xl font-black leading-tight sm:text-5xl"
                    >
                      No Song Selected
                    </button>
                    <input
                      id="songTitleEditInput"
                      type="text"
                      maxlength="18"
                      placeholder="Untitled"
                      class="hidden w-full rounded-xl border border-lime-400/80 bg-neutral-950 px-3 py-2 text-3xl font-black text-neutral-100 outline-none ring-lime-400 focus:ring sm:text-4xl"
                    />
                    <p
                      id="songTitleLimitInfo"
                      role="status"
                      aria-live="polite"
                      class="title-limit-dialog pointer-events-none absolute right-0 top-full z-30 mt-2 hidden text-xs font-black tracking-[0.06em] text-amber-300"
                    >
                      Max 18 characters.
                    </p>
                  </div>
                  <div class="mt-3">
                    <div class="relative inline-block">
                      <button
                        id="timeSignatureLabel"
                        type="button"
                        aria-haspopup="true"
                        aria-expanded="false"
                        class="line-ui inline-flex min-h-[4.2rem] min-w-[4.2rem] items-center justify-center rounded-xl px-3 py-2 text-center text-3xl font-black tracking-tight text-neutral-100"
                      >
                        4/4
                      </button>
                      <div
                        id="timeSignatureMenu"
                        class="absolute left-0 top-full z-20 mt-2 hidden rounded-xl border border-neutral-700 bg-neutral-900/95 p-4 shadow-xl"
                        style="width: min(24rem, calc(100vw - 2.5rem));"
                      >
                    <div class="grid grid-cols-2 gap-3">
                      <button
                        id="ts44Btn"
                        type="button"
                        class="line-ui min-h-[3.2rem] rounded-lg px-3 text-base font-black active:scale-[0.98]"
                      >
                        4/4
                      </button>
                      <button
                        id="ts68Btn"
                        type="button"
                        class="line-ui min-h-[3.2rem] rounded-lg px-3 text-base font-black active:scale-[0.98]"
                      >
                        6/8
                      </button>
                      <button
                        id="ts34Btn"
                        type="button"
                        class="line-ui min-h-[3.2rem] rounded-lg px-3 text-base font-black active:scale-[0.98]"
                      >
                        3/4
                      </button>
                      <button
                        id="tsCustomBtn"
                        type="button"
                        class="line-ui min-h-[3.2rem] rounded-lg px-3 text-base font-black active:scale-[0.98]"
                      >
                        Custom
                      </button>
                    </div>
                    <div id="customSignaturePanel" class="mt-3 hidden rounded-lg border border-neutral-700 bg-neutral-900/70 p-3">
                      <div class="space-y-3">
                        <label class="block">
                          <span class="mb-1 block text-[0.62rem] font-bold uppercase tracking-[0.16em] text-neutral-400">Top</span>
                          <div class="grid grid-cols-[3rem_1fr_3rem] gap-2">
                            <button
                              type="button"
                              data-custom-numerator-step="-1"
                              class="line-ui custom-step-btn min-h-[3.1rem] rounded-lg text-2xl font-black leading-none"
                              aria-label="Decrease top number"
                            >
                              -
                            </button>
                            <input
                              id="customSignatureNumeratorInput"
                              type="number"
                              min="1"
                              max="32"
                              step="1"
                              inputmode="numeric"
                              placeholder="5"
                              class="min-h-[3.1rem] w-full appearance-none rounded-lg border border-neutral-700 bg-neutral-950 px-3 py-2 text-center text-2xl font-black text-neutral-100 outline-none ring-lime-400 focus:ring"
                            />
                            <button
                              type="button"
                              data-custom-numerator-step="1"
                              class="line-ui custom-step-btn min-h-[3.1rem] rounded-lg text-2xl font-black leading-none"
                              aria-label="Increase top number"
                            >
                              +
                            </button>
                          </div>
                        </label>
                        <label class="block">
                          <span class="mb-1 block text-[0.62rem] font-bold uppercase tracking-[0.16em] text-neutral-400">Bottom</span>
                          <div class="grid grid-cols-[3rem_1fr_3rem] gap-2">
                            <button
                              type="button"
                              data-custom-denominator-step="-1"
                              class="line-ui custom-step-btn min-h-[3.1rem] rounded-lg text-2xl font-black leading-none"
                              aria-label="Decrease bottom number"
                            >
                              -
                            </button>
                            <input
                              id="customSignatureDenominatorInput"
                              type="number"
                              min="2"
                              max="16"
                              step="1"
                              inputmode="numeric"
                              placeholder="4"
                              class="min-h-[3.1rem] w-full appearance-none rounded-lg border border-neutral-700 bg-neutral-950 px-3 py-2 text-center text-2xl font-black text-neutral-100 outline-none ring-lime-400 focus:ring"
                            />
                            <button
                              type="button"
                              data-custom-denominator-step="1"
                              class="line-ui custom-step-btn min-h-[3.1rem] rounded-lg text-2xl font-black leading-none"
                              aria-label="Increase bottom number"
                            >
                              +
                            </button>
                          </div>
                        </label>
                      </div>
                      <button
                        id="applyCustomSignatureBtn"
                        type="button"
                        class="mt-3 min-h-[3rem] w-full rounded-lg border border-lime-400 bg-lime-400 px-4 py-2 text-sm font-black uppercase tracking-wide text-black"
                      >
                        Apply
                      </button>
                      <p id="customSignatureError" class="mt-2 hidden text-xs font-semibold text-red-400"></p>
                    </div>
                      </div>
                    </div>
                  </div>
                </div>
                <div class="flex w-36 shrink-0 flex-col gap-2">
                  <button
                    id="accentToggleBtn"
                    type="button"
                    class="line-ui min-h-[3rem] rounded-lg px-3 text-sm font-black tracking-[0.04em] text-neutral-100 active:scale-[0.98]"
                  >
                    Accent
                  </button>
                  <button
                    id="doubleTimeToggleBtn"
                    type="button"
                    class="line-ui min-h-[3rem] rounded-lg px-3 text-sm font-black tracking-[0.04em] text-neutral-100 active:scale-[0.98]"
                  >
                    Double Time
                  </button>
                </div>
              </div>
            </header>

            <section class="space-y-4 sm:space-y-5">
              <p
                id="bpmDisplay"
                class="w-full text-center text-[28vw] font-black leading-none text-lime-300 sm:text-[22vw] lg:text-[11rem]"
              >
                120
              </p>
              <div id="transportControlsRow" class="grid grid-cols-3 gap-3">
                <button
                  id="prevBtn"
                  class="line-ui min-h-[4.3rem] rounded-2xl text-4xl font-black leading-none text-neutral-100 active:scale-[0.98]"
                  type="button"
                  aria-label="Previous song"
                >
                  ⏮
                </button>
                <button
                  id="playBtn"
                  class="line-ui min-h-[4.3rem] rounded-2xl text-4xl font-black leading-none text-neutral-100 active:scale-[0.98]"
                  type="button"
                  aria-label="Play or pause"
                >
                  ▶
                </button>
                <button
                  id="nextBtn"
                  class="line-ui min-h-[4.3rem] rounded-2xl text-4xl font-black leading-none text-neutral-100 active:scale-[0.98]"
                  type="button"
                  aria-label="Next song"
                >
                  ⏭
                </button>
              </div>
              <div id="bpmAdjustRow" class="mt-5">
                <div class="bpm-side-stack bpm-minus-stack">
                  <button
                    id="bpmMinus10Btn"
                    type="button"
                    class="line-ui bpm-adjust-btn min-h-[3.4rem] min-w-[4.6rem] rounded-xl px-3 text-base text-neutral-100 active:scale-[0.98]"
                  >
                    -10
                  </button>
                  <button
                    id="bpmMinus1Btn"
                    type="button"
                    class="line-ui bpm-adjust-btn min-h-[3.4rem] min-w-[4.6rem] rounded-xl px-3 text-base text-neutral-100 active:scale-[0.98]"
                  >
                    -1
                  </button>
                </div>
                <div
                  id="bpmRoller"
                  role="slider"
                  tabindex="0"
                  aria-label="BPM roller"
                  aria-valuemin="0"
                  aria-valuemax="240"
                  aria-valuenow="120"
                  class="bpm-roller relative flex h-32 w-32 items-center justify-center rounded-full border border-neutral-700 bg-neutral-900 shadow-[0_0_30px_rgba(132,204,22,0.18)] outline-none ring-lime-400 focus:ring-2"
                >
                  <div id="bpmRollerProgress" class="pointer-events-none absolute inset-0 rounded-full"></div>
                  <div class="pointer-events-none absolute inset-[0.6rem] rounded-full bg-neutral-900 border border-neutral-700/80"></div>
                  <div id="bpmRollerDial" class="pointer-events-none absolute inset-0">
                    <div class="bpm-dial-indicator absolute"></div>
                  </div>
                </div>
                <div class="bpm-side-stack">
                  <button
                    id="bpmPlus1Btn"
                    type="button"
                    class="line-ui bpm-adjust-btn min-h-[4.6rem] min-w-[5.8rem] rounded-xl px-4 text-lg text-neutral-100 active:scale-[0.98]"
                  >
                    +1
                  </button>
                  <button
                    id="bpmPlus10Btn"
                    type="button"
                    class="line-ui bpm-adjust-btn min-h-[4.6rem] min-w-[5.8rem] rounded-xl px-4 text-lg text-neutral-100 active:scale-[0.98]"
                  >
                    +10
                  </button>
                </div>
              </div>
              <div id="accentMapPanel" class="mx-auto mt-4 w-full max-w-xl">
                <div id="accentBeatButtons" class="flex w-full flex-wrap items-center justify-center gap-2.5"></div>
              </div>
            </section>

          </div>
        </section>

        <section
          id="setlistPanel"
          class="flex min-h-[22vh] flex-col rounded-2xl border border-neutral-800 bg-neutral-900/60 p-3 sm:p-4 lg:min-h-[42vh]"
        >
          <div class="mb-3 flex items-center justify-between gap-2">
            <h2 class="text-sm font-black tracking-[0.08em] text-neutral-300">Setlist</h2>
            <div class="flex items-center gap-2">
              <button
                id="clearSetlistBtn"
                type="button"
                class="line-ui danger-line-ui inline-flex min-h-[2.8rem] min-w-[4.8rem] items-center justify-center rounded-lg px-3 py-1 text-sm font-black tracking-[0.04em] text-neutral-100"
              >
                Reset
              </button>
              <button
                id="addSongBtn"
                type="button"
                class="line-ui add-song-solid"
                aria-label="Add song"
              >
                <svg class="add-plus-icon" viewBox="0 0 20 20" aria-hidden="true">
                  <path d="M10 4v12M4 10h12" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" />
                </svg>
              </button>
            </div>
          </div>

          <div id="setlistContainer" class="setlist-scroll flex-1 space-y-1.5 overflow-y-auto pr-1"></div>
          <nav aria-label="Social links" class="mt-2 flex items-center justify-center gap-2 pt-1.5">
            <a
              class="line-ui setlist-social-link text-neutral-300"
              href="https://github.com/widodoalfianto/etro"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="GitHub"
            >
              <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M12 2a10 10 0 0 0-3.16 19.49c.5.09.68-.22.68-.48v-1.7c-2.78.61-3.37-1.18-3.37-1.18-.45-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.6.07-.6 1 .07 1.54 1.03 1.54 1.03.9 1.53 2.35 1.09 2.92.83.09-.65.35-1.09.64-1.34-2.22-.25-4.56-1.11-4.56-4.95 0-1.09.39-1.98 1.03-2.68-.1-.25-.45-1.27.1-2.64 0 0 .84-.27 2.75 1.02a9.5 9.5 0 0 1 5 0c1.91-1.29 2.75-1.02 2.75-1.02.55 1.37.2 2.39.1 2.64.64.7 1.03 1.59 1.03 2.68 0 3.85-2.34 4.69-4.57 4.94.36.31.68.93.68 1.88v2.79c0 .26.18.58.69.48A10 10 0 0 0 12 2Z" />
              </svg>
            </a>
          </nav>
        </section>
      </main>
    </div>

    <div
      id="clearConfirmModal"
      class="fixed inset-0 z-50 hidden items-end justify-center bg-black/70 p-4 sm:items-center"
      aria-hidden="true"
    >
      <div class="w-full max-w-md rounded-2xl border border-neutral-700 bg-neutral-900 p-4 sm:p-5">
        <h3 class="text-xl font-black">Reset Setlist</h3>
        <p class="mt-3 text-sm font-semibold text-neutral-200">Are you sure you want to reset the current setlist?</p>
        <div class="mt-5 flex gap-2">
          <button
            id="cancelClearModalBtn"
            type="button"
            class="flex-1 rounded-xl border border-neutral-700 bg-neutral-950 px-3 py-2 text-sm font-black tracking-[0.04em]"
          >
            Cancel
          </button>
          <button
            id="confirmClearModalBtn"
            type="button"
            class="flex-1 rounded-xl border border-red-400 bg-red-400 px-3 py-2 text-sm font-black tracking-[0.04em] text-black"
          >
            Reset
          </button>
        </div>
      </div>
    </div>

    <div
      id="deleteConfirmModal"
      class="fixed inset-0 z-50 hidden items-end justify-center bg-black/70 p-4 sm:items-center"
      aria-hidden="true"
    >
      <div class="w-full max-w-md rounded-2xl border border-neutral-700 bg-neutral-900 p-4 sm:p-5">
        <h3 class="text-xl font-black">Delete</h3>
        <p id="deleteConfirmMessage" class="mt-3 text-sm font-semibold text-neutral-200">Are you sure you want to delete this song?</p>
        <div class="mt-5 flex gap-2">
          <button
            id="cancelDeleteModalBtn"
            type="button"
            class="flex-1 rounded-xl border border-neutral-700 bg-neutral-950 px-3 py-2 text-sm font-black tracking-[0.04em]"
          >
            Cancel
          </button>
          <button
            id="confirmDeleteModalBtn"
            type="button"
            class="flex-1 rounded-xl border border-red-400 bg-red-400 px-3 py-2 text-sm font-black tracking-[0.04em] text-black"
          >
            Delete
          </button>
        </div>
      </div>
    </div>
    <script src="./assets/js/app.js"></script>
  </body>
</html>
